name: Secret Guard

on:
  push:
  pull_request:

jobs:
  scan-secrets:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run secret guard
        run: node scripts/secret-guard.mjs --all
