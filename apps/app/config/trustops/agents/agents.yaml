## Agent Collaboration Matrix

```yaml
collaborations:
  - agents: [Noor, EP]
    pattern: Build → Validate
    use_case: Component generation with validation
    
  - agents: [Jules, EP]
    pattern: Audit → Governance
    use_case: Code quality enforcement
    
  - agents: [Lumi, 6]
    pattern: Explore → Stabilize
    use_case: UI variant testing
    
  - agents: [Noor, Jules]
    pattern: Build → Track
    use_case: Rapid development with drift detection
```

