projects:
  app:
    required_envs:
      production:
        - "STRIPE_SECRET_KEY"
        - "STRIPE_WEBHOOK_SECRET"
        - "NEXT_PUBLIC_SITE_URL"
        - "NEXT_PUBLIC_APP_URL"
      test:
        - "STRIPE_SECRET_KEY"
        - "STRIPE_WEBHOOK_SECRET"
        - "NEXT_PUBLIC_SITE_URL"
        - "NEXT_PUBLIC_APP_URL"
    optional_envs:
      - "SUPABASE_URL"
      - "SUPABASE_ANON_KEY"
      - "SUPABASE_SERVICE_ROLE_KEY"
      
  site:
    required_envs:
      production:
        - "NEXT_PUBLIC_SITE_URL"
        - "NEXT_PUBLIC_APP_URL"
        - "NEXT_PUBLIC_GUEST_URL"
      test:
        - "NEXT_PUBLIC_SITE_URL"
        - "NEXT_PUBLIC_APP_URL"
        - "NEXT_PUBLIC_GUEST_URL"
        
  guests:
    required_envs:
      production:
        - "NEXT_PUBLIC_GUEST_URL"
        - "NEXT_PUBLIC_APP_URL"
        - "STRIPE_PUBLIC_KEY"
      test:
        - "NEXT_PUBLIC_GUEST_URL"
        - "NEXT_PUBLIC_APP_URL"
        - "STRIPE_PUBLIC_KEY"
